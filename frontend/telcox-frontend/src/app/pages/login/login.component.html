<div class="login-wrapper d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow border-0 rounded-4 p-4" style="width: 100%; max-width: 400px;">
    
    <div class="text-center mb-4">
      <div class="d-flex align-items-center justify-content-center gap-2 mb-2">
        <i class="bi bi-cpu-fill text-primary fs-2"></i>
        <h2 class="fw-bold m-0 text-dark">TelcoX</h2>
      </div>
      <p class="text-muted small">Ingresa tus credenciales para acceder a tu panel</p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger border-0 small rounded-3 p-2 text-center mb-3">
      <i class="bi bi-exclamation-circle-fill me-1"></i> {{ errorMessage }}
    </div>

    <form (ngSubmit)="onLogin()">
      <div class="mb-3">
        <label class="form-label small fw-semibold text-secondary">Nombre de Usuario</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
          <input type="text" name="username" [(ngModel)]="username" 
                 class="form-control bg-light border-start-0" placeholder="Ej. carlos_teran" required>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-semibold text-secondary">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" [(ngModel)]="password" 
                 class="form-control bg-light border-start-0" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" [disabled]="loading" class="btn btn-primary w-100 py-2 rounded-3 fw-bold shadow-sm d-flex align-items-center justify-content-center gap-2">
        <span *ngIf="loading" class="spinner-border spinner-border-sm" role="status"></span>
        <span>{{ loading ? 'Autenticando...' : 'Iniciar Sesión' }}</span>
      </button>
    </form>

  </div>
</div>
